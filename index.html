<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Eid Mubarak | Fireworks & Sensors</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,600;1,700&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #050a15;
            --gold: #d4af37;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            height: 100dvh;
            width: 100vw;
            overflow: hidden;
            font-family: 'Montserrat', sans-serif;
            touch-action: none;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        .ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none; 
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
            text-align: center;
        }

        .title-box {
            background: rgba(5, 10, 21, 0.4);
            padding: 40px;
            border-radius: 20px;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(212, 175, 55, 0.2);
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            transition: transform 0.1s ease-out;
        }

        h1 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 4rem;
            line-height: 1;
            background: linear-gradient(180deg, #fff, var(--gold));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        h2 {
            font-size: 1.2rem;
            color: #ccc;
            letter-spacing: 4px;
            font-weight: 300;
            text-transform: uppercase;
        }

        /* Subtle hint that disappears after first tap */
        #tap-hint {
            position: absolute;
            bottom: 60px;
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.8);
            letter-spacing: 2px;
            text-transform: uppercase;
            animation: pulseHint 2s infinite;
            transition: opacity 0.5s;
        }

        @keyframes pulseHint {
            0%, 100% { opacity: 0.4; transform: scale(0.95); }
            50% { opacity: 1; transform: scale(1.05); }
        }

        .credit {
            position: absolute;
            bottom: 15px;
            width: 100%;
            text-align: center;
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.3);
            letter-spacing: 2px;
            z-index: 10;
        }
    </style>
</head>
<body>

    <canvas id="stage"></canvas>

    <div class="ui-layer">
        <div class="title-box" id="card">
            <h1>Eid<br>Mubarak</h1>
            <h2>from Ateeq</h2>
        </div>
        <div id="tap-hint">Tap anywhere to celebrate</div>
    </div>

    <div class="credit">Designed by ATEEQ</div>

    <script>
        const canvas = document.getElementById('stage');
        const ctx = canvas.getContext('2d');
        let width, height;

        // --- Core Variables ---
        let gravityX = 0;
        let windForce = 0;
        let lanterns = [];
        let windParticles = [];
        let fireworks = [];
        let confettis = [];
        
        let isInitialized = false;
        let audioCtx;

        const colors = ['#d4af37', '#ff5e62', '#38ef7d', '#00c6ff', '#ffffff', '#ff99cc'];

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        // --- AUDIO SYNTHESIS ENGINE ---
        // Generates firework sounds directly in code (no external MP3s needed)
        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        function playFireworkSound(isBig) {
            if (!audioCtx) return;
            
            // White noise buffer
            const bufferSize = audioCtx.sampleRate * (isBig ? 1.5 : 0.5);
            const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) {
                data[i] = Math.random() * 2 - 1; 
            }
            
            const noise = audioCtx.createBufferSource();
            noise.buffer = buffer;

            // Filter to make it sound like a boom/crackle instead of static
            const filter = audioCtx.createBiquadFilter();
            filter.type = isBig ? 'lowpass' : 'bandpass';
            filter.frequency.value = isBig ? 800 : 3000;
            if(!isBig) filter.Q.value = 1;

            // Volume fading (Envelope)
            const gainNode = audioCtx.createGain();
            gainNode.gain.setValueAtTime(isBig ? 1 : 0.4, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + (isBig ? 1.4 : 0.4));

            noise.connect(filter);
            filter.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            noise.start();
        }

        // --- FIRST TAP INITIALIZATION (Unlocks Browsers) ---
        async function startExperience(e) {
            if (isInitialized) return;
            isInitialized = true;

            // Hide the hint text
            document.getElementById('tap-hint').style.opacity = '0';
            
            // 1. Init Audio
            initAudio();

            // 2. Request Gyro & Accel Permissions (iOS 13+)
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                try {
                    const perm = await DeviceOrientationEvent.requestPermission();
                    if (perm === 'granted') {
                        window.addEventListener('deviceorientation', handleOrientation);
                        window.addEventListener('devicemotion', handleShake);
                    }
                } catch (err) { console.log("Motion denied"); }
            } else {
                window.addEventListener('deviceorientation', handleOrientation);
                window.addEventListener('devicemotion', handleShake);
            }

            // 3. Request Mic Permissions (For Wind)
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                setupMicWind(stream);
            } catch (err) { console.log("Mic denied"); }

            // Trigger the first touch firework immediately
            handleTouch(e);
        }

        // --- SENSOR 1: Gyroscope (Real Gravity for Lanterns) ---
        function handleOrientation(e) {
            let g = e.gamma || 0;
            if (g > 90) g = 90; if (g < -90) g = -90;
            gravityX = g / 45; 
            
            // Subtle card parallax
            document.getElementById('card').style.transform = `rotateY(${g/3}deg)`;
        }

        // --- SENSOR 2: Accelerometer (Shake for Big Fireworks) ---
        let lastX, lastY, lastZ;
        let lastShake = 0;
        function handleShake(e) {
            let acc = e.accelerationIncludingGravity;
            if (!acc || !acc.x) return;

            if (lastX !== undefined) {
                let delta = Math.abs(acc.x - lastX) + Math.abs(acc.y - lastY) + Math.abs(acc.z - lastZ);
                if (delta > 40) { // Shake detected
                    let now = Date.now();
                    if (now - lastShake > 1000) { // 1 second cooldown
                        triggerBigFirework();
                        lastShake = now;
                    }
                }
            }
            lastX = acc.x; lastY = acc.y; lastZ = acc.z;
        }

        // --- SENSOR 3: Microphone (Physical Wind) ---
        function setupMicWind(stream) {
            const analyser = audioCtx.createAnalyser();
            const source = audioCtx.createMediaStreamSource(stream);
            source.connect(analyser);
            analyser.fftSize = 256;
            const dataArray = new Uint8Array(analyser.frequencyBinCount);

            function updateWind() {
                analyser.getByteFrequencyData(dataArray);
                let sum = 0;
                for(let i=0; i<dataArray.length; i++) sum += dataArray[i];
                let avg = sum / dataArray.length;
                
                if (avg > 20) {
                    windForce = (avg - 20) / 40; 
                    if(Math.random() > 0.5) windParticles.push(new WindParticle(windForce));
                } else {
                    windForce *= 0.9; 
                }
                requestAnimationFrame(updateWind);
            }
            updateWind();
        }


        // --- PHYSICS VISUALS ---

        // 1. Fireworks
        class Firework {
            constructor(x, y, isBig = false) {
                this.x = x;
                this.y = y;
                this.isBig = isBig;
                this.color = colors[Math.floor(Math.random() * colors.length)];
                
                let angle = Math.random() * Math.PI * 2;
                let speed = isBig ? (Math.random() * 12 + 6) : (Math.random() * 6 + 2);
                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed;
                
                this.life = 1.0;
                this.decay = isBig ? (Math.random() * 0.015 + 0.005) : (Math.random() * 0.03 + 0.015);
                this.size = isBig ? (Math.random() * 4 + 2) : (Math.random() * 2 + 1);
            }
            update() {
                this.vx += gravityX * 0.5 + windForce * 0.2; 
                this.vy += 0.15; // Standard gravity pulling down
                this.vx *= 0.96; // Air resistance
                this.vy *= 0.96;
                this.x += this.vx;
                this.y += this.vy;
                this.life -= this.decay;
            }
            draw() {
                ctx.globalAlpha = Math.max(0, this.life);
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                
                if (this.isBig) {
                    ctx.shadowBlur = 10;
                    ctx.shadowColor = this.color;
                    ctx.fill();
                    ctx.shadowBlur = 0;
                }
            }
        }

        // 2. Confetti
        class Confetti {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.color = colors[Math.floor(Math.random() * colors.length)];
                this.size = Math.random() * 8 + 4;
                this.vx = (Math.random() - 0.5) * 10;
                this.vy = (Math.random() - 0.5) * 10 - 2;
                this.angle = Math.random() * 360;
                this.spin = (Math.random() - 0.5) * 0.2;
            }
            update() {
                this.vx += windForce * 0.5;
                this.vy += 0.05; // Light gravity
                this.vx *= 0.98;
                this.x += this.vx;
                this.y += this.vy + Math.sin(this.angle) * 2; // Flutter effect
                this.angle += this.spin;
            }
            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.angle);
                ctx.fillStyle = this.color;
                ctx.globalAlpha = 0.8;
                ctx.fillRect(-this.size/2, -this.size/2, this.size, this.size * 1.5);
                ctx.restore();
            }
        }

        // 3. Hanging Lanterns (Pendulums)
        class Lantern {
            constructor(x) {
                this.originX = x;
                this.originY = 0;
                this.length = 150 + Math.random() * 100;
                this.angle = 0;
                this.aVelocity = 0;
                this.aAcceleration = 0;
            }
            update() {
                let force = -0.01 * Math.sin(this.angle) + (gravityX * 0.005) + (windForce * 0.01);
                this.aAcceleration = force;
                this.aVelocity += this.aAcceleration;
                this.aVelocity *= 0.95; 
                this.angle += this.aVelocity;
            }
            draw() {
                let endX = this.originX + this.length * Math.sin(this.angle);
                let endY = this.originY + this.length * Math.cos(this.angle);

                ctx.beginPath();
                ctx.moveTo(this.originX, this.originY);
                ctx.lineTo(endX, endY);
                ctx.strokeStyle = 'rgba(212, 175, 55, 0.4)';
                ctx.lineWidth = 2;
                ctx.stroke();

                ctx.beginPath();
                ctx.arc(endX, endY, 12, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(212, 175, 55, 0.8)';
                ctx.fill();
                ctx.shadowBlur = 15;
                ctx.shadowColor = '#d4af37';
                ctx.fill();
                ctx.shadowBlur = 0; 
            }
        }

        // 4. Visual Wind
        class WindParticle {
            constructor(force) {
                this.x = 0;
                this.y = Math.random() * height;
                this.vx = force * 20 + 10;
                this.length = Math.random() * 150 + 50;
                this.opacity = 0.5;
            }
            update() {
                this.x += this.vx;
                this.opacity -= 0.02;
            }
            draw() {
                ctx.beginPath();
                ctx.moveTo(this.x, this.y);
                ctx.lineTo(this.x - this.length, this.y);
                ctx.strokeStyle = `rgba(255, 255, 255, ${this.opacity})`;
                ctx.lineWidth = 1;
                ctx.stroke();
            }
        }

        function initLanterns() {
            lanterns.push(new Lantern(width * 0.15));
            lanterns.push(new Lantern(width * 0.5));
            lanterns.push(new Lantern(width * 0.85));
        }

        // --- Interaction Triggers ---

        function handleTouch(e) {
            let touchX = e.touches ? e.touches[0].clientX : e.clientX;
            let touchY = e.touches ? e.touches[0].clientY : e.clientY;

            // Generate small fireworks & confetti
            for(let i=0; i<30; i++) fireworks.push(new Firework(touchX, touchY, false));
            for(let i=0; i<10; i++) confettis.push(new Confetti(touchX, touchY));

            playFireworkSound(false);
            if(navigator.vibrate) navigator.vibrate(20);
        }

        function triggerBigFirework() {
            // Shoots from center or bottom
            let cx = width / 2 + (Math.random() * 100 - 50);
            let cy = height * 0.4 + (Math.random() * 100 - 50);

            // Create massive multi-layer burst
            for(let i=0; i<150; i++) fireworks.push(new Firework(cx, cy, true));
            for(let i=0; i<40; i++) confettis.push(new Confetti(cx, cy));

            playFireworkSound(true);
            if(navigator.vibrate) navigator.vibrate([100, 50, 200]);
        }

        // Attach listeners directly to the document
        document.addEventListener('touchstart', (e) => {
            if (!isInitialized) startExperience(e);
            else handleTouch(e);
        }, {passive: false});

        document.addEventListener('click', (e) => {
            if (!isInitialized) startExperience(e);
            else handleTouch(e);
        });

        // --- Main Animation Loop ---
        initLanterns();

        function animate() {
            // Draw background with slight trail effect
            ctx.globalAlpha = 1;
            ctx.fillStyle = 'rgba(5, 10, 21, 0.3)';
            ctx.fillRect(0, 0, width, height);

            ctx.globalAlpha = 1;
            lanterns.forEach(l => { l.update(); l.draw(); });
            
            for(let i = windParticles.length - 1; i >= 0; i--) {
                windParticles[i].update();
                windParticles[i].draw();
                if(windParticles[i].opacity <= 0) windParticles.splice(i, 1);
            }

            for(let i = confettis.length - 1; i >= 0; i--) {
                confettis[i].update();
                confettis[i].draw();
                if(confettis[i].y > height + 20) confettis.splice(i, 1);
            }

            for(let i = fireworks.length - 1; i >= 0; i--) {
                fireworks[i].update();
                fireworks[i].draw();
                if(fireworks[i].life <= 0) fireworks.splice(i, 1);
            }

            requestAnimationFrame(animate);
        }
        
        animate();

    </script>
</body>
</html>
