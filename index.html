<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Eid Mubarak | Physical Sandbox</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,600;1,700&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #050a15;
            --gold: #d4af37;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            height: 100dvh;
            width: 100vw;
            overflow: hidden;
            font-family: 'Montserrat', sans-serif;
            touch-action: none;
        }

        /* Full screen physics canvas */
        canvas {
            display: block;
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        /* The Overlay Text */
        .ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none; /* Lets you touch the canvas underneath */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
            text-align: center;
        }

        .title-box {
            background: rgba(5, 10, 21, 0.4);
            padding: 40px;
            border-radius: 20px;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(212, 175, 55, 0.2);
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }

        h1 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 4rem;
            line-height: 1;
            background: linear-gradient(180deg, #fff, var(--gold));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        h2 {
            font-size: 1.2rem;
            color: #ccc;
            letter-spacing: 4px;
            font-weight: 300;
            text-transform: uppercase;
        }

        /* Developer Credit */
        .credit {
            position: absolute;
            bottom: 15px;
            width: 100%;
            text-align: center;
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.3);
            letter-spacing: 2px;
            z-index: 10;
        }

        /* Intro Screen to get permissions */
        #intro {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #050a15;
            color: white;
            z-index: 100;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 0.5s;
        }

        .start-btn {
            background: transparent;
            border: 2px solid var(--gold);
            color: var(--gold);
            padding: 15px 40px;
            font-size: 1.2rem;
            border-radius: 30px;
            margin-top: 20px;
            font-family: inherit;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

    <div id="intro">
        <div style="font-size: 3rem; margin-bottom: 20px;">🌙</div>
        <h3 style="font-weight: 300; letter-spacing: 2px;">SENSOR SANDBOX</h3>
        <p style="font-size: 0.8rem; opacity: 0.6; margin-top: 10px;">Allow Mic & Motion access</p>
        <button class="start-btn" id="startBtn">ENTER</button>
    </div>

    <canvas id="stage"></canvas>

    <div class="ui-layer">
        <div class="title-box">
            <h1>Eid<br>Mubarak</h1>
            <h2>from Ateeq</h2>
        </div>
    </div>

    <div class="credit">Designed by ATEEQ</div>

    <script>
        const canvas = document.getElementById('stage');
        const ctx = canvas.getContext('2d');
        let width, height;

        // --- Physics Variables ---
        let gravityX = 0;
        let gravityY = 0.5; // Default downward gravity
        let windForce = 0;  // Driven by microphone
        let coins = [];
        let lanterns = [];
        let windParticles = [];

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        // --- Master Setup & Permissions ---
        document.getElementById('startBtn').addEventListener('click', async () => {
            document.getElementById('intro').style.opacity = '0';
            setTimeout(() => document.getElementById('intro').remove(), 500);

            // 1. Gyro & Accel Permissions
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                try {
                    const perm = await DeviceOrientationEvent.requestPermission();
                    if (perm === 'granted') {
                        window.addEventListener('deviceorientation', handleOrientation);
                        window.addEventListener('devicemotion', handleShake);
                    }
                } catch (e) { console.log("Motion denied"); }
            } else {
                window.addEventListener('deviceorientation', handleOrientation);
                window.addEventListener('devicemotion', handleShake);
            }

            // 2. Microphone Permissions
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                setupMicWind(stream);
            } catch (e) { console.log("Mic denied"); }

            // Initialize Sandbox Elements
            initLanterns();
            spawnCoins(10); // Start with a few coins
            animate();
        });

        // --- SENSOR 1: Gyroscope (Real Gravity) ---
        function handleOrientation(e) {
            // Beta is front/back tilt (-180 to 180). Gamma is left/right (-90 to 90)
            let b = e.beta || 0;
            let g = e.gamma || 0;

            // Constrain and map to gravity vectors
            if (b > 90) b = 90; if (b < -90) b = -90;
            
            // Map tilt to a physical force multiplier
            gravityX = g / 45; 
            gravityY = b / 45;
        }

        // --- SENSOR 2: Accelerometer (Shake for Coins) ---
        let lastX, lastY, lastZ;
        let lastShake = 0;
        function handleShake(e) {
            let acc = e.accelerationIncludingGravity;
            if (!acc || !acc.x) return;

            if (lastX !== undefined) {
                let delta = Math.abs(acc.x - lastX) + Math.abs(acc.y - lastY) + Math.abs(acc.z - lastZ);
                if (delta > 30) { // Shake detected
                    let now = Date.now();
                    if (now - lastShake > 500) {
                        if(navigator.vibrate) navigator.vibrate([100, 50, 100]);
                        spawnCoins(15); // Drop 15 new coins!
                        lastShake = now;
                    }
                }
            }
            lastX = acc.x; lastY = acc.y; lastZ = acc.z;
        }

        // --- SENSOR 3: Microphone (Physical Wind) ---
        function setupMicWind(stream) {
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const analyser = audioCtx.createAnalyser();
            const source = audioCtx.createMediaStreamSource(stream);
            source.connect(analyser);
            analyser.fftSize = 256;
            const dataArray = new Uint8Array(analyser.frequencyBinCount);

            function updateWind() {
                analyser.getByteFrequencyData(dataArray);
                let sum = 0;
                for(let i=0; i<dataArray.length; i++) sum += dataArray[i];
                let avg = sum / dataArray.length;
                
                // If noise is loud enough, create wind force
                if (avg > 20) {
                    windForce = (avg - 20) / 50; 
                    // Create visual wind streaks
                    if(Math.random() > 0.5) windParticles.push(new WindParticle(windForce));
                } else {
                    windForce *= 0.9; // Wind dies down naturally
                }
                requestAnimationFrame(updateWind);
            }
            updateWind();
        }

        // --- Physics Objects ---

        // 1. Coins (Eidi)
        class Coin {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.vx = (Math.random() - 0.5) * 10;
                this.vy = (Math.random() - 0.5) * 10;
                this.radius = 20 + Math.random() * 10; // Different sized coins
                this.restitution = 0.6; // Bounciness
            }
            update() {
                // Apply Gravity and Wind
                this.vx += gravityX + (windForce * 0.2); 
                this.vy += gravityY;
                
                // Add friction
                this.vx *= 0.98;
                this.vy *= 0.98;

                this.x += this.vx;
                this.y += this.vy;

                // Screen Edge Collisions (Bouncing)
                let bounced = false;
                if (this.x - this.radius < 0) { this.x = this.radius; this.vx *= -this.restitution; bounced = true; }
                if (this.x + this.radius > width) { this.x = width - this.radius; this.vx *= -this.restitution; bounced = true; }
                if (this.y - this.radius < 0) { this.y = this.radius; this.vy *= -this.restitution; bounced = true; }
                if (this.y + this.radius > height) { this.y = height - this.radius; this.vy *= -this.restitution; bounced = true; }

                // Light haptic tap if it hits a wall hard
                if (bounced && Math.abs(this.vx) + Math.abs(this.vy) > 5) {
                    if(navigator.vibrate) navigator.vibrate(5);
                }
            }
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = '#d4af37'; // Gold
                ctx.fill();
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 2;
                ctx.stroke();
                
                // Coin detailing
                ctx.fillStyle = '#050a15';
                ctx.font = `bold ${this.radius}px Montserrat`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('🌙', this.x, this.y + 2);
            }
        }

        function spawnCoins(amount) {
            for(let i=0; i<amount; i++) {
                // Drop from the top center/random
                coins.push(new Coin(width/2 + (Math.random() * 100 - 50), -50));
            }
            // Keep performance good by limiting max coins
            if(coins.length > 60) coins.splice(0, coins.length - 60); 
        }

        // 2. Hanging Lanterns (Pendulum Physics)
        class Lantern {
            constructor(x) {
                this.originX = x;
                this.originY = 0;
                this.length = 150 + Math.random() * 150;
                this.angle = 0;
                this.aVelocity = 0;
                this.aAcceleration = 0;
            }
            update() {
                // Pendulum math: Gravity affects angle. Wind physically pushes the lantern.
                // We use gravityX to make them swing when the phone tilts.
                let force = -0.01 * Math.sin(this.angle) + (gravityX * 0.005) + (windForce * 0.01);
                
                this.aAcceleration = force;
                this.aVelocity += this.aAcceleration;
                this.aVelocity *= 0.95; // Dampening so it doesn't swing forever
                this.angle += this.aVelocity;
            }
            draw() {
                let endX = this.originX + this.length * Math.sin(this.angle);
                let endY = this.originY + this.length * Math.cos(this.angle);

                // Draw string
                ctx.beginPath();
                ctx.moveTo(this.originX, this.originY);
                ctx.lineTo(endX, endY);
                ctx.strokeStyle = 'rgba(212, 175, 55, 0.5)';
                ctx.lineWidth = 2;
                ctx.stroke();

                // Draw Lantern Bulb
                ctx.beginPath();
                ctx.arc(endX, endY, 15, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(212, 175, 55, 0.8)';
                ctx.fill();
                ctx.shadowBlur = 20;
                ctx.shadowColor = '#d4af37';
                ctx.fill();
                ctx.shadowBlur = 0; // reset
            }
        }

        function initLanterns() {
            lanterns.push(new Lantern(width * 0.2));
            lanterns.push(new Lantern(width * 0.5));
            lanterns.push(new Lantern(width * 0.8));
        }

        // 3. Visual Wind Streaks
        class WindParticle {
            constructor(force) {
                this.x = 0;
                this.y = Math.random() * height;
                this.vx = force * 15 + 10;
                this.length = Math.random() * 100 + 50;
                this.opacity = 0.5;
            }
            update() {
                this.x += this.vx;
                this.opacity -= 0.02;
            }
            draw() {
                ctx.beginPath();
                ctx.moveTo(this.x, this.y);
                ctx.lineTo(this.x - this.length, this.y);
                ctx.strokeStyle = `rgba(255, 255, 255, ${this.opacity})`;
                ctx.lineWidth = 2;
                ctx.stroke();
            }
        }

        // --- Touch Interaction (Flicking Coins) ---
        canvas.addEventListener('touchstart', (e) => {
            let touchX = e.touches[0].clientX;
            let touchY = e.touches[0].clientY;
            
            // Check if we tapped near a coin to flick it away
            coins.forEach(coin => {
                let dx = coin.x - touchX;
                let dy = coin.y - touchY;
                let dist = Math.sqrt(dx*dx + dy*dy);
                if (dist < coin.radius * 3) {
                    coin.vx = (dx / dist) * 25; // Flick velocity
                    coin.vy = (dy / dist) * 25;
                    if(navigator.vibrate) navigator.vibrate(15);
                }
            });
        });

        // --- Main Animation Loop ---
        function animate() {
            // Draw slightly transparent background for motion blur effect
            ctx.fillStyle = 'rgba(5, 10, 21, 0.3)';
            ctx.fillRect(0, 0, width, height);

            lanterns.forEach(l => { l.update(); l.draw(); });
            
            coins.forEach(c => { c.update(); c.draw(); });
            
            for(let i = windParticles.length - 1; i >= 0; i--) {
                windParticles[i].update();
                windParticles[i].draw();
                if(windParticles[i].opacity <= 0 || windParticles[i].x > width + 200) {
                    windParticles.splice(i, 1);
                }
            }

            requestAnimationFrame(animate);
        }

    </script>
</body>
</html>
