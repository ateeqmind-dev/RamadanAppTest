<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Eid Mubarak | Ultimate Sensor Experience</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;1,600&family=Lato:wght@300;400&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-deep: #0a0e17;
            --emerald: #0b4b3c;
            --gold: #d4af37;
            --gold-light: #f3e5ab;
            --text-light: #f8f9fa;
            /* This variable will be dynamically updated by the microphone */
            --mic-glow: 0px; 
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Lato', sans-serif;
            background-color: var(--bg-deep);
            color: var(--text-light);
            height: 100dvh; 
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            touch-action: none;
        }

        #touch-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* Intro Screen */
        #intro-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, var(--bg-deep), var(--emerald));
            z-index: 50;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 0.6s ease, transform 0.6s ease;
            text-align: center;
            padding: 20px;
        }

        .tap-pulse {
            width: 80px;
            height: 80px;
            background: rgba(212, 175, 55, 0.2);
            border: 2px solid var(--gold);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            animation: pulseTap 1.5s infinite;
            margin-bottom: 20px;
            font-size: 2rem;
        }

        @keyframes pulseTap {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(212, 175, 55, 0.7); }
            70% { transform: scale(1.1); box-shadow: 0 0 0 20px rgba(212, 175, 55, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(212, 175, 55, 0); }
        }

        #gyro-stage {
            width: 100%;
            height: 100%;
            position: absolute;
            display: flex;
            justify-content: center;
            align-items: center;
            perspective: 800px;
            z-index: 10;
            opacity: 0;
            transform: scale(0.9);
            transition: opacity 1s ease, transform 1s ease;
        }

        /* The Premium Card - Notice the dynamic box-shadow using var(--mic-glow) */
        #mobile-card {
            width: 85%;
            max-width: 380px;
            aspect-ratio: 3/4;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(212, 175, 55, 0.4);
            border-radius: 24px;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5), inset 0 0 20px rgba(212, 175, 55, 0.1), 0 0 calc(var(--mic-glow) * 1.5) rgba(212, 175, 55, 0.4);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 30px;
            text-align: center;
            transform-style: preserve-3d;
            transition: box-shadow 0.1s ease-out;
        }

        .card-content {
            transform: translateZ(50px);
        }

        h1.title {
            font-family: 'Playfair Display', serif;
            font-size: 3.5rem;
            font-style: italic;
            background: linear-gradient(to right, var(--gold-light), var(--gold));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 5px;
            line-height: 1.1;
        }

        p.subtitle {
            font-size: 1.2rem;
            color: var(--text-light);
            letter-spacing: 2px;
            margin-bottom: 30px;
            opacity: 0.9;
        }

        /* The Moon - Dynamically glows based on voice volume */
        .moon-icon {
            font-size: 4rem;
            margin-bottom: 15px;
            filter: drop-shadow(0 0 calc(15px + var(--mic-glow)) var(--gold));
            transform: translateZ(70px);
            animation: float 4s ease-in-out infinite;
            transition: filter 0.1s ease-out;
        }

        .touch-hint {
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.7);
            margin-top: 20px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .credit-footer {
            position: absolute;
            bottom: 20px;
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.3);
            letter-spacing: 3px;
            text-transform: uppercase;
            z-index: 10;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) translateZ(70px); }
            50% { transform: translateY(-15px) translateZ(70px); }
        }
    </style>
</head>
<body>

    <div id="intro-screen">
        <div class="tap-pulse">✨</div>
        <p style="letter-spacing: 2px; font-weight: 300; font-size: 1.2rem; margin-bottom: 10px;">TAP TO UNLOCK</p>
        <p style="font-size: 0.8rem; color: rgba(255,255,255,0.6); max-width: 80%;">Allow permissions when asked to enable motion and sound reactions!</p>
    </div>

    <canvas id="touch-canvas"></canvas>

    <div id="gyro-stage">
        <div id="mobile-card">
            <div class="moon-icon">🌙</div>
            <div class="card-content">
                <h1 class="title">Eid<br>Mubarak</h1>
                <p class="subtitle">from Ateeq</p>
                <p class="touch-hint">Tap screen • Shake phone • Make some noise</p>
            </div>
        </div>
    </div>

    <div class="credit-footer">Designed by ATEEQ</div>

    <script>
        const introScreen = document.getElementById('intro-screen');
        const gyroStage = document.getElementById('gyro-stage');
        const card = document.getElementById('mobile-card');
        const canvas = document.getElementById('touch-canvas');
        const ctx = canvas.getContext('2d');

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // --- Master Initialization ---
        introScreen.addEventListener('click', async () => {
            introScreen.style.opacity = '0';
            introScreen.style.pointerEvents = 'none';
            setTimeout(() => {
                gyroStage.style.opacity = '1';
                gyroStage.style.transform = 'scale(1)';
            }, 300);

            // 1. Request Gyroscope & Accelerometer
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                try {
                    const permissionState = await DeviceOrientationEvent.requestPermission();
                    if (permissionState === 'granted') {
                        window.addEventListener('deviceorientation', handleOrientation);
                        window.addEventListener('devicemotion', handleMotion);
                    }
                } catch (e) { console.error("Motion permissions denied", e); }
            } else {
                window.addEventListener('deviceorientation', handleOrientation);
                window.addEventListener('devicemotion', handleMotion);
            }

            // 2. Request Microphone Access
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                setupAudioAnalysis(stream);
            } catch (e) {
                console.log("Microphone access denied or not available. Voice glow disabled.");
            }
        });

        // --- SENSOR 1: Gyroscope (Parallax Tilt) ---
        function handleOrientation(event) {
            let gamma = event.gamma || 0; 
            let beta = event.beta || 30;   

            if (gamma > 45) gamma = 45;
            if (gamma < -45) gamma = -45;
            if (beta > 60) beta = 60;
            if (beta < 0) beta = 0; 

            const rotateY = gamma / 2; 
            const rotateX = (beta - 30) / -2; 

            card.style.transform = `rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
        }

        // --- SENSOR 2 & 3: Accelerometer (Shake) & Haptics ---
        let lastX, lastY, lastZ;
        let shakeThreshold = 25; // How hard they need to shake
        let lastShakeTime = 0;

        function handleMotion(event) {
            let acc = event.accelerationIncludingGravity;
            if (!acc || !acc.x) return;

            if (lastX !== undefined) {
                let deltaX = Math.abs(lastX - acc.x);
                let deltaY = Math.abs(lastY - acc.y);
                let deltaZ = Math.abs(lastZ - acc.z);
                let totalMovement = deltaX + deltaY + deltaZ;

                if (totalMovement > shakeThreshold) {
                    let now = Date.now();
                    // Prevent firing too rapidly
                    if (now - lastShakeTime > 1000) { 
                        triggerMegaExplosion();
                        lastShakeTime = now;
                    }
                }
            }
            lastX = acc.x; lastY = acc.y; lastZ = acc.z;
        }

        // --- SENSOR 4: Microphone (Audio API) ---
        function setupAudioAnalysis(stream) {
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const analyser = audioCtx.createAnalyser();
            const source = audioCtx.createMediaStreamSource(stream);
            source.connect(analyser);
            
            analyser.fftSize = 256;
            const bufferLength = analyser.frequencyBinCount;
            const dataArray = new Uint8Array(bufferLength);

            function updateGlow() {
                analyser.getByteFrequencyData(dataArray);
                let sum = 0;
                for(let i = 0; i < bufferLength; i++) {
                    sum += dataArray[i];
                }
                let average = sum / bufferLength;
                
                // Set the CSS variable dynamically based on volume (mapped from 0 to ~50px)
                document.documentElement.style.setProperty('--mic-glow', `${average * 0.8}px`);
                
                requestAnimationFrame(updateGlow);
            }
            updateGlow();
        }

        // --- Touch Interactions & Fireworks System ---
        let particles = [];

        class TouchParticle {
            constructor(x, y, isMega = false) {
                this.x = x;
                this.y = y;
                const angle = Math.random() * Math.PI * 2;
                // Mega explosion sends particles faster and further
                const speed = isMega ? (Math.random() * 15 + 5) : (Math.random() * 6 + 2);
                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed;
                this.life = 1.0;
                this.decay = isMega ? (Math.random() * 0.01 + 0.005) : (Math.random() * 0.02 + 0.015);
                this.color = Math.random() > 0.4 ? '#d4af37' : (Math.random() > 0.5 ? '#0b4b3c' : '#ffffff');
                this.size = isMega ? (Math.random() * 5 + 2) : (Math.random() * 3 + 1);
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.vy += 0.15; // Gravity
                this.life -= this.decay;
            }
            draw() {
                ctx.globalAlpha = Math.max(0, this.life);
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        // Standard Tap
        function createExplosion(x, y) {
            if (navigator.vibrate) navigator.vibrate([30]); 
            for (let i = 0; i < 30; i++) particles.push(new TouchParticle(x, y));
        }

        // Massive Shake Explosion
        function triggerMegaExplosion() {
            if (navigator.vibrate) navigator.vibrate([100, 50, 100, 50, 200]); // Long rumble
            
            // Fire from the center of the screen
            const cx = window.innerWidth / 2;
            const cy = window.innerHeight / 2;
            
            for (let i = 0; i < 150; i++) {
                particles.push(new TouchParticle(cx, cy, true));
            }
        }

        document.body.addEventListener('touchstart', (e) => {
            if (introScreen.style.opacity === '0') {
                const touch = e.touches[0];
                createExplosion(touch.clientX, touch.clientY);
            }
        });

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.update();
                p.draw();
                if (p.life <= 0) particles.splice(i, 1);
            }
            requestAnimationFrame(animate);
        }
        animate();

    </script>
</body>
</html>
